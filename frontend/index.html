<script>
  // 🔥 CHANGE THIS (IMPORTANT)
  const BASE_URL = "http://a41fad7401cca43f598cd57218124ca5-baf351c97aef570c.elb.ap-south-1.amazonaws.com/dhruv/api";

  const USER_SVC   = `${BASE_URL}/users`;
  const BOOK_SVC   = `${BASE_URL}/books`;
  const BORROW_SVC = `${BASE_URL}/borrow`;

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
    if (id === 'register') loadUsers();
    if (id === 'books') loadBooks();
  }

  function showAlert(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = `alert ${type}`;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }

  async function registerUser() {
    const name  = document.getElementById('userName').value.trim();
    const email = document.getElementById('userEmail').value.trim();
    const role  = document.getElementById('userRole').value;
    if (!name || !email) return showAlert('registerAlert', 'Name and email are required.', 'error');

    try {
      const res = await fetch(`${USER_SVC}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, role })
      });
      if (!res.ok) throw new Error('Failed');
      showAlert('registerAlert', 'User registered successfully!', 'success');
      document.getElementById('userName').value = '';
      document.getElementById('userEmail').value = '';
      loadUsers();
    } catch (e) {
      showAlert('registerAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function loadUsers() {
    try {
      const res = await fetch(`${USER_SVC}`);
      const users = await res.json();
      const tbody = document.getElementById('usersTable');
      tbody.innerHTML = users.length === 0
        ? '<tr><td colspan="4">No users registered yet.</td></tr>'
        : users.map(u => `<tr><td>${u.id}</td><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td></tr>`).join('');
    } catch (e) {
      document.getElementById('usersTable').innerHTML = '<tr><td colspan="4">Could not load users.</td></tr>';
    }
  }

  async function addBook() {
    const title  = document.getElementById('bookTitle').value.trim();
    const author = document.getElementById('bookAuthor').value.trim();
    if (!title || !author) return showAlert('bookAlert', 'Title and author are required.', 'error');

    try {
      const res = await fetch(`${BOOK_SVC}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, author })
      });
      if (!res.ok) throw new Error('Failed');
      showAlert('bookAlert', 'Book added successfully!', 'success');
      document.getElementById('bookTitle').value = '';
      document.getElementById('bookAuthor').value = '';
    } catch (e) {
      showAlert('bookAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function borrowBook() {
    const userId = document.getElementById('borrowUserId').value;
    const bookId = document.getElementById('borrowBookId').value;
    if (!userId || !bookId) return showAlert('borrowAlert', 'User ID and Book ID are required.', 'error');

    try {
      const res = await fetch(`${BORROW_SVC}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: Number(userId), bookId: Number(bookId) })
      });
      if (!res.ok) throw new Error('Book may already be issued or not found.');
      showAlert('borrowAlert', 'Book borrowed successfully!', 'success');
    } catch (e) {
      showAlert('borrowAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function returnBook() {
    const bookId = document.getElementById('returnBookId').value;
    if (!bookId) return showAlert('returnAlert', 'Book ID is required.', 'error');

    try {
      const res = await fetch(`${BORROW_SVC}/return`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ bookId: Number(bookId) })
      });
      if (!res.ok) throw new Error('No active borrow record found for this book.');
      showAlert('returnAlert', 'Book returned successfully!', 'success');
    } catch (e) {
      showAlert('returnAlert', 'Error: ' + e.message, 'error');
    }
  }

  async function loadBooks() {
    try {
      const res = await fetch(`${BOOK_SVC}`);
      const books = await res.json();
      const tbody = document.getElementById('booksTable');
      tbody.innerHTML = books.length === 0
        ? '<tr><td colspan="4">No books available.</td></tr>'
        : books.map(b => `
            <tr>
              <td>${b.id}</td>
              <td>${b.title}</td>
              <td>${b.author}</td>
              <td><span class="badge ${b.available ? 'available' : 'issued'}">${b.available ? 'Available' : 'Issued'}</span></td>
            </tr>`).join('');
    } catch (e) {
      document.getElementById('booksTable').innerHTML = '<tr><td colspan="4">Could not load books.</td></tr>';
    }
  }

  // Initial load
  loadUsers();
</script>
